version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: db_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hero_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hero_pass}
      POSTGRES_DB: ${POSTGRES_DB:-db_hero}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hero_user} -d ${POSTGRES_DB:-db_hero}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: